name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt
      - run: >-
          pytest tests/
          --cov=custom_components.clawdmeter
          --cov-report=term-missing
