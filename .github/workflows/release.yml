name: Release

# Builds the HACS-installable zip and attaches it to a published GitHub release.
# The release tag should match the "version" in custom_components/clawdmeter/manifest.json.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and attach zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          manifest_version="$(jq -r .version custom_components/clawdmeter/manifest.json)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$manifest_version" != "$tag" ]; then
            echo "::error::Release tag '$tag' does not match manifest version '$manifest_version'"
            exit 1
          fi

      - name: Zip integration
        run: |
          cd custom_components/clawdmeter
          zip -r clawdmeter.zip .

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/clawdmeter/clawdmeter.zip
